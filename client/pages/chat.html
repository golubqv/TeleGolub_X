<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TeleGolub</title>

<link rel="stylesheet" href="../style.css">

</head>

<body>

<div class="app">

    <aside class="sidebar">

        <div class="logo">

            🕊 TeleGolub

        </div>

        <input
        class="search"
        placeholder="Поиск">

        <div class="chat-list">

            <div class="chat active">

                🤖 TeleGolub AI

            </div>

            <div class="chat">

                👤 Избранное

            </div>

            <div class="chat">

                👥 Друзья

            </div>

            <div class="chat">

                📢 Каналы

            </div>

            <div class="chat">

                🎁 Подарки

            </div>

            <div class="chat">

                👑 TeleGolub Pro

            </div>

            <div class="chat">

                ⚙ Настройки

            </div>

        </div>

    </aside>

    <main class="content">

        <div class="topbar">

            <h2>🤖 TeleGolub AI</h2>

        </div>

        <div class="messages">

            <div class="message ai">

                Добро пожаловать в TeleGolub.

            </div>

            <div class="message me">

                Спасибо ❤️

            </div>

        </div>

        <div class="send">

            <button>😊</button>

            <button>📎</button>

            <button>🎤</button>

            <input
            placeholder="Введите сообщение...">

            <button>➤</button>

        </div>

    </main>

</div>

</body>
</html>
