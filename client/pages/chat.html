<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TeleGolub</title>

<link rel="stylesheet" href="../style.css">

</head>

    <div id="notifyWindow" class="notify-window">

<h2>

Уведомления

</h2>

<div id="notifyList"></div>

    </div>

<body>

<div class="app">

    <aside class="sidebar">

        <div class="logo">

            🕊 TeleGolub

        </div>

        <input
        class="search"
        placeholder="Поиск">

        <div class="chat-list">

            <div class="chat active">

                🤖 TeleGolub AI

            </div>

            <div class="chat">

                👤 Избранное

            </div>

            <div class="chat">

                👥 Друзья

            </div>

            <div class="chat">

                📢 Каналы

            </div>

            <div class="chat">

                🎁 Подарки

            </div>

            <div class="chat">

                👑 TeleGolub Pro
            </div>

            <div class="chat">

                ⚙ Настройки

            </div>

            <button id="editProfile">
✏️ Редактировать профиль
            </button>

        </div>

    <aside class="sidebar">

<div class="logo">

🕊 <span>TeleGolub</span>

</div>

<div class="profile">

<div class="avatar">

TG

</div>

<div>

<h3>Пользователь</h3>

<p>В сети</p>

</div>

</div>

<input
class="search"
placeholder="🔍 Поиск">

<div class="chat-list"></div>

<div class="menu">

<button id="newChat">
💬 Новый чат
</button>

<button id="newGroup">
👥 Новая группа
</button>

<button id="newChannel">
📢 Новый канал
</button>

<button id="pro">
👑 TeleGolub Pro
</button>

<button id="profile">
👤 Профиль
</button>    

<button id="settings">
⚙ Настройки
</button>

</div>

        <button id="audioCall">📞</button>
<button id="videoCall">📹</button>

        <button id="notificationsBtn">

🔔

        </button>

    </aside>

            <h2>🤖 TeleGolub AI</h2>

        </div>

        <div class="messages">

            <div class="message ai">

                Добро пожаловать в TeleGolub.

            </div>

            <div class="message me">

                Спасибо ❤️

            </div>

        </div>

        <div class="send">

            <button>😊</button>

            <button>📎</button>

            <button>🎤</button>

            <input
            placeholder="Введите сообщение...">

            <button>➤</button>

        </div>

    </main>

</div>

    <div class="modal" id="newChatModal">

<div class="modal-window">

<h2>💬 Новый чат</h2>

<input
id="newChatName"
placeholder="Введите имя пользователя">

<div class="modal-buttons">

<button id="cancelChat">

Отмена

</button>

<button id="createChat">

Создать

</button>

</div>

</div>

    </div>

<script src="../js/ai.js"></script>
<script src="../js/router.js"></script>
<script src="../js/pages.js"></script>
<script src="../js/messages.js"></script>
<script src="../js/calls.js"></script>

</body>
</html>
